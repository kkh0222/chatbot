<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>잠자리컴퍼니 챗봇</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
    background: #f0ede8;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  .demo-content { text-align: center; padding: 40px; }
  .demo-content h1 { font-size: 2rem; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; }
  .demo-content p { font-size: 1rem; color: #777; }

  /* ── 위젯 컨테이너 ── */
  #chat-widget {
    position: fixed; bottom: 28px; right: 28px;
    z-index: 9999;
    font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
  }

  /* ── 토글 버튼 ── */
  #chat-toggle {
    width: 60px; height: 60px; border-radius: 50%;
    background: #1a1a1a; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    transition: transform 0.2s, background 0.2s;
    margin-left: auto;
  }
  #chat-toggle:hover { transform: scale(1.08); background: #333; }
  #chat-toggle .icon-chat { display: block; }
  #chat-toggle .icon-close { display: none; }
  #chat-toggle.open .icon-chat { display: none; }
  #chat-toggle.open .icon-close { display: block; }

  /* ── 채팅 박스 ── */
  #chat-box {
    width: 360px; height: 560px;
    background: #fff; border-radius: 20px;
    box-shadow: 0 12px 48px rgba(0,0,0,0.18);
    display: flex; flex-direction: column; overflow: hidden;
    margin-bottom: 12px;
    opacity: 0; transform: translateY(20px) scale(0.97);
    pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease;
  }
  #chat-box.open { opacity: 1; transform: translateY(0) scale(1); pointer-events: all; }

  /* ── 헤더 ── */
  .chat-header {
    background: #1a1a1a; color: #fff;
    padding: 16px 20px;
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
  }
  .chat-header-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: #fff;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .chat-header-info { flex: 1; }
  .chat-header-name { font-size: 0.95rem; font-weight: 700; }
  .chat-header-status { font-size: 0.72rem; color: #aaa; margin-top: 2px; display: flex; align-items: center; gap: 5px; }
  .status-dot { width: 7px; height: 7px; background: #4ade80; border-radius: 50%; }

  /* 홈 버튼 */
  .home-btn {
    background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
    color: #fff; border-radius: 8px; padding: 5px 10px;
    font-size: 0.75rem; cursor: pointer; white-space: nowrap;
    transition: background 0.15s; font-family: inherit;
    display: flex; align-items: center; gap: 4px;
  }
  .home-btn:hover { background: rgba(255,255,255,0.25); }

  /* ── 메시지 영역 ── */
  .chat-messages {
    flex: 1; overflow-y: auto;
    padding: 20px 16px;
    display: flex; flex-direction: column; gap: 12px;
    background: #fafaf9;
  }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

  /* 메시지 버블 */
  .msg { display: flex; gap: 8px; align-items: flex-end; }
  .msg-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: #e8e4de;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 0.7rem; font-weight: 700;
  }
  .msg-bubble {
    max-width: 82%;
    padding: 11px 14px; border-radius: 16px;
    font-size: 0.875rem; line-height: 1.6; word-break: break-word;
    background: #fff; color: #1a1a1a;
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    white-space: pre-line;
  }

  /* ── 버튼 메뉴 영역 ── */
  .btn-menu {
    padding: 14px 16px 16px;
    background: #fafaf9;
    display: flex; flex-direction: column; gap: 8px;
    flex-shrink: 0;
    border-top: 1px solid #f0ede8;
  }
  .btn-menu-label {
    font-size: 0.72rem; color: #aaa; margin-bottom: 2px; padding-left: 2px;
  }
  .menu-btn {
    width: 100%; padding: 11px 16px;
    background: #fff; border: 1.5px solid #e0dbd4;
    border-radius: 12px; font-size: 0.875rem;
    cursor: pointer; text-align: left; color: #1a1a1a;
    transition: all 0.15s; font-family: inherit;
    display: flex; align-items: center; justify-content: space-between;
  }
  .menu-btn:hover { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .menu-btn .arrow { font-size: 0.8rem; opacity: 0.5; }
  .menu-btn:hover .arrow { opacity: 1; }

  /* 링크 버튼 */
  .link-btn {
    width: 100%; padding: 10px 16px;
    background: #fff; border: 1.5px solid #e0dbd4;
    border-radius: 12px; font-size: 0.85rem;
    cursor: pointer; text-align: left; color: #1a1a1a;
    transition: all 0.15s; font-family: inherit;
    display: flex; align-items: center; gap: 8px;
    text-decoration: none;
  }
  .link-btn:hover { background: #f5f3f0; border-color: #bbb; }
  .link-btn .link-icon { font-size: 1rem; flex-shrink: 0; }

  /* ── 경고 배너 ── */
  .warn-banner {
    background: #fff3cd;
    border-bottom: 1px solid #ffe08a;
    padding: 8px 14px;
    font-size: 0.8rem;
    color: #7a5a00;
    display: flex; align-items: flex-start; gap: 6px;
    flex-shrink: 0;
    line-height: 1.5;
  }
  .warn-banner .warn-icon { flex-shrink: 0; font-size: 0.9rem; margin-top: 1px; }

  /* ── 공식 채널 영역 ── */
  .channel-section {
    padding: 10px 16px 4px;
    background: #fafaf9;
    flex-shrink: 0;
  }
  .channel-label {
    font-size: 0.8rem; color: #aaa; margin-bottom: 6px;
  }
  .channel-links {
    display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px;
  }
  .channel-btn {
    padding: 5px 11px;
    background: #fff; border: 1.5px solid #e0dbd4;
    border-radius: 20px; font-size: 0.76rem;
    color: #444; text-decoration: none;
    transition: all 0.15s; white-space: nowrap;
    display: flex; align-items: center; gap: 4px;
  }
  .channel-btn:hover { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

  @media (max-width: 480px) {
    #chat-box { width: calc(100vw - 32px); }
    #chat-widget { right: 16px; bottom: 16px; }
  }
</style>
</head>
<body>

<div class="demo-content">
  <h1>잠자리컴퍼니 챗봇 데모</h1>
  <p>우측 하단 버튼을 눌러보세요 👇</p>
</div>

<!-- ════ 챗봇 위젯 ════ -->
<div id="chat-widget">
  <div id="chat-box">

    <!-- 헤더 -->
    <div class="chat-header">
      <div class="chat-header-avatar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z" fill="#1a1a1a"/>
        </svg>
      </div>
      <div class="chat-header-info">
        <div class="chat-header-name">잠자리컴퍼니</div>
        <div class="chat-header-status"><span class="status-dot"></span> 온라인</div>
      </div>
      <button class="home-btn" onclick="goHome()">처음으로</button>
    </div>

    <!-- 경고 배너 -->
    <div class="warn-banner">
      <span class="warn-icon">⚠️</span>
      <span><b>사칭 주의!</b> 잠자리 체험단은 절대 금전 요구를 하지 않습니다. 반드시 공식 계정을 확인하세요.</span>
    </div>

    <!-- 공식 채널 (홈일 때만 표시) -->
    <div class="channel-section" id="channel-section">
      <div class="channel-label">📌 공식 채널</div>
      <div class="channel-links">
        <a class="channel-btn" href="https://www.alljam.co.kr/company" target="_blank" rel="noopener">홈페이지</a>
        <a class="channel-btn" href="https://blog.naver.com/alljam10" target="_blank" rel="noopener">블로그</a>
        <a class="channel-btn" href="https://www.instagram.com/jamjari_kr" target="_blank" rel="noopener">인스타 </a>
        <a class="channel-btn" href="https://www.instagram.com/jamjari_company" target="_blank" rel="noopener">인스타 </a>
      </div>
    </div>

    <!-- 메시지 -->
    <div class="chat-messages" id="messages">
      <div class="msg">
        <div class="msg-avatar">잠</div>
        <div class="msg-bubble" id="intro-bubble">안녕하세요! 잠자리컴퍼니입니다 😊
무엇을 도와드릴까요?</div>
      </div>
    </div>

    <!-- 버튼 메뉴 -->
    <div class="btn-menu" id="btn-menu"></div>
  </div>

  <!-- 토글 버튼 -->
  <button id="chat-toggle" onclick="toggleChat()">
    <svg class="icon-chat" width="26" height="26" viewBox="0 0 24 24" fill="none">
      <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z" fill="#fff"/>
    </svg>
    <svg class="icon-close" width="22" height="22" viewBox="0 0 24 24" fill="none">
      <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" fill="#fff"/>
    </svg>
  </button>
</div>

<script>
/* ═══════════════════════════════════════════════
   메뉴 구조 정의
   - type: 'menu'  → 하위 버튼 목록 표시
   - type: 'link'  → 새 탭으로 링크 이동
   - type: 'info'  → 텍스트 말풍선만 표시
═══════════════════════════════════════════════ */
const MENUS = {
  home: {
    bubble: "안녕하세요! 잠자리컴퍼니입니다 😊\n무엇을 도와드릴까요?",
    label: "문의 유형을 선택해 주세요",
    buttons: [
      { text: "🤝 제휴문의 (사장님전용)", next: "partner" },
      { text: "📸 체험단 문의",           next: "review"  },
      { text: "👥 프렌즈 문의",           next: "friends" },
    ]
  },

  // ── 제휴문의 ──
  partner: {
    bubble: "제휴문의 메뉴입니다.\n원하시는 항목을 선택해 주세요!",
    label: "제휴문의",
    buttons: [
      { text: "📋 서비스 소개",   next: "partner_service" },
      { text: "🗂️ 포트폴리오",    type: "link", url: "https://alljam.co.kr/company/about" },
      { text: "💬 제휴 상담 문의", type: "link", url: "https://alljam.co.kr/company/inquiry" },
      { text: "📞 담당자 연락처", next: "partner_contact" },
    ]
  },
  partner_service: {
    bubble: "잠자리컴퍼니 제휴 서비스 안내입니다 😊\n\n📱 마케팅 — SNS·블로그·유튜브 채널 운영 대행\n🌐 홈페이지 제작 — 호텔·숙박업 특화 웹사이트\n📷 촬영 — 공간·음식·제품 홍보 사진 촬영\n🖨️ 홍보물 제작 — 리플렛·배너·명함·카드뉴스",
    label: "제휴문의",
    buttons: [
      { text: "🗂️ 포트폴리오 보기",  type: "link", url: "https://alljam.co.kr/company/about" },
      { text: "💬 제휴 상담 문의",    type: "link", url: "https://alljam.co.kr/company/inquiry" },
      { text: "← 제휴문의로 돌아가기", next: "partner" },
    ]
  },
  partner_contact: {
    bubble: "제휴 담당자 연락처입니다 📞\n\n☎️ 070-8688-8253\n📱 010-3132-8151\n\n평일 09:00 ~ 18:00\n(주말·공휴일 휴무)",
    label: "제휴문의",
    buttons: [
      { text: "💬 제휴 상담 문의하기", type: "link", url: "https://alljam.co.kr/company/inquiry" },
      { text: "← 제휴문의로 돌아가기", next: "partner" },
    ]
  },

  // ── 체험단 문의 ──
  review: {
    bubble: "체험단 문의 메뉴입니다.\n원하시는 항목을 선택해 주세요!",
    label: "체험단 문의",
    buttons: [
      { text: "📖 이용 가이드",     type: "link", url: "https://alljam.co.kr/guide" },
      { text: "✏️ 체험단 신청",     type: "link", url: "https://alljam.co.kr/" },
      { text: "💬 1:1 문의게시판",  type: "link", url: "https://alljam.co.kr/auth" },
      { text: "📞 담당자 연락처",   next: "review_contact" },
    ]
  },
  review_contact: {
    bubble: "체험단 담당자 연락처입니다 📞\n\n☎️ 070-8688-8253\n💛 카카오톡 ID : alljam20\n\n평일 09:00 ~ 18:00\n(주말·공휴일 휴무)",
    label: "체험단 문의",
    buttons: [
      { text: "💬 1:1 문의게시판", type: "link", url: "https://alljam.co.kr/auth" },
      { text: "← 체험단 문의로 돌아가기", next: "review" },
    ]
  },

  // ── 프렌즈 문의 ──
  friends: {
    bubble: "프렌즈 문의 메뉴입니다.\n원하시는 항목을 선택해 주세요!",
    label: "프렌즈 문의",
    buttons: [
      { text: "❓ 프렌즈란?",        type: "link", url: "https://alljam.co.kr/friends" },
      { text: "📢 프렌즈 공지사항",  type: "link", url: "https://alljam.co.kr/company/notices?preset_id=&filters%5Bquery%5D=&page=1&per_page=20&token=d87a9c5e" },
      { text: "✍️ 프렌즈 신청하기",  type: "link", url: "https://alljam.co.kr/friends/apply" },
    ]
  },
};

/* ── 상태 ── */
let isOpen = false;
let currentMenu = 'home';

/* ── 초기화 ── */
document.addEventListener('DOMContentLoaded', () => renderMenu('home'));

/* ── 토글 ── */
function toggleChat() {
  isOpen = !isOpen;
  document.getElementById('chat-box').classList.toggle('open', isOpen);
  document.getElementById('chat-toggle').classList.toggle('open', isOpen);
}

/* ── 홈으로 ── */
function goHome() {
  renderMenu('home');
}

/* ── 메뉴 렌더링 ── */
function renderMenu(key) {
  currentMenu = key;
  const menu = MENUS[key];
  if (!menu) return;

  // 공식 채널 홈에서만 표시
  const channelSection = document.getElementById('channel-section');
  if (channelSection) channelSection.style.display = key === 'home' ? 'block' : 'none';

  // 말풍선 업데이트
  const messages = document.getElementById('messages');
  messages.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'msg';
  wrap.innerHTML = `<div class="msg-avatar">잠</div><div class="msg-bubble">${menu.bubble}</div>`;
  messages.appendChild(wrap);

  // 버튼 메뉴 렌더링
  const btnMenu = document.getElementById('btn-menu');
  btnMenu.innerHTML = '';

  if (menu.label) {
    const label = document.createElement('div');
    label.className = 'btn-menu-label';
    label.textContent = menu.label;
    btnMenu.appendChild(label);
  }

  menu.buttons.forEach(btn => {
    if (btn.type === 'link') {
      const a = document.createElement('a');
      a.className = 'link-btn';
      a.href = btn.url;
      a.target = '_blank';
      a.rel = 'noopener';
      a.innerHTML = `<span class="link-icon">🔗</span>${btn.text}`;
      btnMenu.appendChild(a);
    } else {
      const b = document.createElement('button');
      b.className = 'menu-btn';
      b.innerHTML = `<span>${btn.text}</span><span class="arrow">›</span>`;
      b.onclick = () => renderMenu(btn.next);
      btnMenu.appendChild(b);
    }
  });
}
</script>
</body>
</html>
